<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancada Alvinegra RN - Wallpapers ABC FC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000000; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(255,255,255,0.1); }
        .grid-item { aspect-ratio: 16/9; }
        @media (max-width: 640px) { .grid-item { aspect-ratio: 9/16; } }
        .loading { background: linear-gradient(90deg, #111 25%, #333 50%, #111 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-white font-sans">
    <!-- Header -->
    <header class="bg-black/80 backdrop-blur-md sticky top-0 z-50 py-4 border-b border-white/20">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-yellow-400 via-red-500 to-yellow-400 bg-clip-text text-transparent">
                <i class="fas fa-futbol mr-3"></i>
                Bancada Alvinegra RN
            </h1>
            <p class="text-xl mt-2 text-white/80">Wallpapers Mais Querido ⚫⚪</p>
        </div>
    </header>

    <!-- Filtros -->
    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-wrap gap-3 justify-center mb-8">
            <button onclick="filterWallpapers('todos')" class="filter-btn bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full font-bold transition-all duration-300 border-2 border-white/30 active">
                <i class="fas fa-th mr-2"></i>Todos
            </button>
            <button onclick="filterWallpapers('Celular')" class="filter-btn bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full font-bold transition-all duration-300 border-2 border-white/30">
                <i class="fas fa-mobile-alt mr-2"></i>Celular
            </button>
            <button onclick="filterWallpapers('PC')" class="filter-btn bg-white/10 hover:bg-white/20 px-6 py-3 rounded-full font-bold transition-all duration-300 border-2 border-white/30">
                <i class="fas fa-desktop mr-2"></i>PC
            </button>
        </div>

        <!-- Grid de Wallpapers -->
        <div id="wallpapers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Wallpapers serão inseridos aqui via JS -->
        </div>
    </div>

    <!-- Modal Social Locker -->
    <div id="social-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-gradient-to-b from-black to-gray-900 border-2 border-white/20 rounded-2xl p-8 max-w-md w-full text-center max-h-[90vh] overflow-y-auto">
            <div class="mb-6">
                <i class="fas fa-lock-open text-6xl text-yellow-400 mb-4"></i>
                <h2 class="text-2xl font-bold mb-2">Ei, Frasqueira! 🔒</h2>
                <p class="text-white/80 mb-6">Fortalece a Bancada? Siga nosso Instagram para liberar o download!</p>
            </div>
            
            <div class="space-y-4 mb-8">
                <a href="https://instagram.com/bancadaalvinegrarn" target="_blank" class="block bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 flex items-center justify-center mx-auto">
                    <i class="fab fa-instagram mr-3 text-xl"></i>
                    Seguir agora
                </a>
                
                <button onclick="unlockDownload()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 border-2 border-green-500/50">
                    <i class="fas fa-check mr-2"></i>Já sigo / Liberar Download
                </button>
            </div>
            
            <p class="text-xs text-white/50">Após liberar, não aparecerá mais por 7 dias ⚫⚪</p>
        </div>
    </div>

    <!-- Script Principal -->
    <script>
        // 🎯 URLs CORRIGIDAS do Google Drive (CONVERTIDAS para download direto)
        const wallpapers = [
            {
                id: 1,
                titulo: "ABC Campeão Invicto 2023",
                categoria: "Celular",
                url: "https://drive.google.com/uc?export=download&id=1zZId4rpSgmZRBpcrbGoV1SQQp61V-Wx4",
                preview: "https://drive.google.com/thumbnail?id=1zZId4rpSgmZRBpcrbGoV1SQQp61V-Wx4"
            },
            {
                id: 2,
                titulo: "Mais Querido do RN",
                categoria: "PC",
                url: "https://drive.google.com/uc?export=download&id=1RDIcmA0r5epfJvbnkyb24OKKiDus-nIK",
                preview: "https://drive.google.com/thumbnail?id=1RDIcmA0r5epfJvbnkyb24OKKiDus-nIK"
            },
            {
                id: 3,
                titulo: "Frasqueirão lotado",
                categoria: "Celular",
                url: "https://drive.google.com/uc?export=download&id=1Lm4leeGHj5m-UgQ889yQ31U1JXk5oKxc",
                preview: "https://drive.google.com/thumbnail?id=1Lm4leeGHj5m-UgQ889yQ31U1JXk5oKxc"
            },
            {
                id: 4,
                titulo: "Dragão Alvinegro",
                categoria: "PC",
                url: "https://drive.google.com/uc?export=download&id=1uVNo64zQRa3DAu1kpejn-MLWckk8RltY",
                preview: "https://drive.google.com/thumbnail?id=1uVNo64zQRa3DAu1kpejn-MLWckk8RltY"
            },
            {
                id: 5,
                titulo: "Time de Guerreiros",
                categoria: "Celular",
                url: "https://drive.google.com/uc?export=download&id=1UinxG2q7w9mMwbn6UfhtbfvBO-gwPjxR",
                preview: "https://drive.google.com/thumbnail?id=1UinxG2q7w9mMwbn6UfhtbfvBO-gwPjxR"
            },
            {
                id: 6,
                titulo: "Raiz Alvinegra",
                categoria: "PC",
                url: "https://drive.google.com/uc?export=download&id=1Sjz5sUvY8CxjTCWb-N15r5vbagdYY9VL",
                preview: "https://drive.google.com/thumbnail?id=1Sjz5sUvY8CxjTCWb-N15r5vbagdYY9VL"
            }
        ];

        let currentFilter = 'todos';

        // Renderiza os wallpapers
        function renderWallpapers(wallpapersToShow) {
            const grid = document.getElementById('wallpapers-grid');
            grid.innerHTML = '';

            wallpapersToShow.forEach(wallpaper => {
                const card = document.createElement('div');
                card.className = 'card-hover bg-black border-2 border-white/20 rounded-2xl overflow-hidden cursor-pointer group relative';
                card.onclick = () => openSocialModal(wallpaper.url, wallpaper.titulo);
                
                card.innerHTML = `
                    <div class="grid-item w-full bg-gradient-to-br from-black to-gray-900 relative overflow-hidden">
                        <img src="${wallpaper.preview}" alt="${wallpaper.titulo}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 loading"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-end p-6">
                            <div>
                                <h3 class="font-bold text-xl mb-1">${wallpaper.titulo}</h3>
                                <span class="px-3 py-1 bg-white/20 rounded-full text-sm">${wallpaper.categoria}</span>
                            </div>
                        </div>
                        <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-all duration-500">
                            <i class="fas fa-download text-2xl bg-white/20 p-3 rounded-full hover:bg-white/30"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filtro
        function filterWallpapers(category) {
            currentFilter = category.toLowerCase();
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-black', 'border-white', 'active');
                btn.classList.add('bg-white/10', 'border-white/30');
            });
            
            event.target.classList.remove('bg-white/10', 'border-white/30');
            event.target.classList.add('bg-white', 'text-black', 'border-white');

            let filtered = wallpapers;
            if (category !== 'todos') {
                filtered = wallpapers.filter(w => w.categoria === category);
            }
            
            renderWallpapers(filtered);
        }

        // Modal Social Locker
        function openSocialModal(imageUrl, titulo) {
            localStorage.setItem('last_wallpaper_url', imageUrl);
            localStorage.setItem('last_wallpaper_titulo', titulo);
            
            const unlockTime = localStorage.getItem('bancada_unlock_time');
            const now = Date.now();
            
            if (unlockTime && (now - parseInt(unlockTime)) < 7 * 24 * 60 * 60 * 1000) {
                downloadImage(imageUrl, titulo);
                return;
            }

            document.getElementById('social-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function unlockDownload() {
            localStorage.setItem('bancada_unlock_time', Date.now().toString());
            document.getElementById('social-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            
            const lastUrl = localStorage.getItem('last_wallpaper_url');
            const lastTitulo = localStorage.getItem('last_wallpaper_titulo');
            if (lastUrl && lastTitulo) {
                downloadImage(lastUrl, lastTitulo);
            }
        }

        // Download FORÇADO do Google Drive
        function downloadImage(url, filename) {
            // Cria canvas temporário para forçar download
            const link = document.createElement('a');
            link.href = url;
            link.download = filename.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.jpg';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Mostra toast de sucesso
            showToast('Download iniciado! ⚫⚪');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl z-[10000] animate-pulse';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Fecha modal clicando fora
        document.getElementById('social-modal').onclick = function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        };

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            renderWallpapers(wallpapers);
        });
    </script>
</body>
</html>
